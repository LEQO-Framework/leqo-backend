request: |
  {
    "metadata": {
      "version": "1.0.0",
      "name": "If-Else Qiskit",
      "description": "Test if-else control flow translation to Qiskit.",
      "author": ""
    },
    "compilation_target": "qiskit",
    "nodes": [
      { "id": "q0", "type": "qubit" },
      { "id": "gate_h", "type": "gate", "gate": "h" },
      { "id": "m0", "type": "measure", "indices": [0] },
      {
        "id": "if_node",
        "type": "if-then-else",
        "condition": "x == 1",
        "thenBlock": {
          "nodes": [
            { "id": "gate_x", "type": "gate", "gate": "x" }
          ],
          "edges": [
            { "source": ["gate_x", 0], "target": ["if_node", 1] },
            { "source": ["if_node", 1], "target": ["gate_x", 0] }
          ]
        },
        "elseBlock": {
          "nodes": [],
          "edges": [{ "source": ["if_node", 1], "target": ["if_node", 1] }]
        }
      }
    ],
    "edges": [
      { "source": ["m0", 0], "target": ["if_node", 0], "identifier": "x" },
      { "source": ["m0", 1], "target": ["if_node", 1] },
      { "source": ["gate_h", 0], "target": ["m0", 0] },
      { "source": ["q0", 0], "target": ["gate_h", 0] }
    ]
  }
expected_status: 200
expected_result: |-
  from qiskit import QuantumCircuit, QuantumRegister, ClassicalRegister, transpile
  from qiskit.circuit.classical import types
  from qiskit_aer import AerSimulator
  import qiskit.circuit.classical.expr as expr
  qc = QuantumCircuit()
  inputs_list = []
  leqo_reg = QuantumRegister(1, 'leqo_reg')
  qc.add_register(leqo_reg)
  '# Start node q0'
  leqo_677c62829b2f503e829851dd8911e48a_literal = [leqo_reg[0]]
  leqo_677c62829b2f503e829851dd8911e48a_out = leqo_677c62829b2f503e829851dd8911e48a_literal
  '# End node q0'
  '# Start node gate_h'
  leqo_e43a67bf75f9513e8e47811ceb82577e_q0 = [leqo_reg[0]]
  qc.h(leqo_e43a67bf75f9513e8e47811ceb82577e_q0)
  leqo_e43a67bf75f9513e8e47811ceb82577e_q0_out = leqo_e43a67bf75f9513e8e47811ceb82577e_q0
  '# End node gate_h'
  '# Start node m0'
  leqo_5f9029b590825673813bc86fde8c5635_q = [leqo_reg[0]]
  leqo_5f9029b590825673813bc86fde8c5635_result = ClassicalRegister(1, 'leqo_5f9029b590825673813bc86fde8c5635_result')
  qc.add_register(leqo_5f9029b590825673813bc86fde8c5635_result)
  qc.measure(leqo_5f9029b590825673813bc86fde8c5635_q[0], leqo_5f9029b590825673813bc86fde8c5635_result[0])
  leqo_5f9029b590825673813bc86fde8c5635_out = leqo_5f9029b590825673813bc86fde8c5635_result
  leqo_5f9029b590825673813bc86fde8c5635_qubit_out = leqo_5f9029b590825673813bc86fde8c5635_q
  '# End node m0'
  '# Start node if_node'
  leqo_2bf267f463475a25b35e99c330ce77b3_leqo_6063d9eea7005902a3c2382a2d42ccc2_pass_node_declaration_0 = leqo_5f9029b590825673813bc86fde8c5635_out
  leqo_2bf267f463475a25b35e99c330ce77b3_leqo_6063d9eea7005902a3c2382a2d42ccc2_pass_node_alias_0 = leqo_2bf267f463475a25b35e99c330ce77b3_leqo_6063d9eea7005902a3c2382a2d42ccc2_pass_node_declaration_0
  leqo_2bf267f463475a25b35e99c330ce77b3_leqo_6063d9eea7005902a3c2382a2d42ccc2_pass_node_declaration_1 = [leqo_reg[0]]
  leqo_2bf267f463475a25b35e99c330ce77b3_leqo_6063d9eea7005902a3c2382a2d42ccc2_pass_node_alias_1 = leqo_2bf267f463475a25b35e99c330ce77b3_leqo_6063d9eea7005902a3c2382a2d42ccc2_pass_node_declaration_1
  leqo_2bf267f463475a25b35e99c330ce77b3_leqo_6063d9eea7005902a3c2382a2d42ccc2_if_reg = leqo_2bf267f463475a25b35e99c330ce77b3_leqo_6063d9eea7005902a3c2382a2d42ccc2_pass_node_declaration_1
  with qc.if_test(expr.equal(expr.cast(leqo_2bf267f463475a25b35e99c330ce77b3_leqo_6063d9eea7005902a3c2382a2d42ccc2_pass_node_declaration_0, types.Uint(32)), expr.cast(1, types.Uint(32)))):
      leqo_2bf267f463475a25b35e99c330ce77b3_leqo_2fb6b67067f752a1a4f49eac0ff2dbb4_q0 = [leqo_2bf267f463475a25b35e99c330ce77b3_leqo_6063d9eea7005902a3c2382a2d42ccc2_if_reg[0]]
      qc.x(leqo_2bf267f463475a25b35e99c330ce77b3_leqo_2fb6b67067f752a1a4f49eac0ff2dbb4_q0)
      leqo_2bf267f463475a25b35e99c330ce77b3_leqo_2fb6b67067f752a1a4f49eac0ff2dbb4_q0_out = leqo_2bf267f463475a25b35e99c330ce77b3_leqo_2fb6b67067f752a1a4f49eac0ff2dbb4_q0
  leqo_2bf267f463475a25b35e99c330ce77b3_leqo_2f5d6b375f3e53d580bd88e169388a53_pass_node_declaration_0 = ClassicalRegister(1, 'leqo_2bf267f463475a25b35e99c330ce77b3_leqo_2f5d6b375f3e53d580bd88e169388a53_pass_node_declaration_0')
  qc.add_register(leqo_2bf267f463475a25b35e99c330ce77b3_leqo_2f5d6b375f3e53d580bd88e169388a53_pass_node_declaration_0)
  leqo_2bf267f463475a25b35e99c330ce77b3_leqo_2f5d6b375f3e53d580bd88e169388a53_pass_node_alias_0 = leqo_2bf267f463475a25b35e99c330ce77b3_leqo_2f5d6b375f3e53d580bd88e169388a53_pass_node_declaration_0
  leqo_2bf267f463475a25b35e99c330ce77b3_leqo_2f5d6b375f3e53d580bd88e169388a53_pass_node_declaration_1 = [leqo_2bf267f463475a25b35e99c330ce77b3_leqo_6063d9eea7005902a3c2382a2d42ccc2_if_reg[0]]
  leqo_2bf267f463475a25b35e99c330ce77b3_leqo_2f5d6b375f3e53d580bd88e169388a53_pass_node_alias_1 = leqo_2bf267f463475a25b35e99c330ce77b3_leqo_2f5d6b375f3e53d580bd88e169388a53_pass_node_declaration_1
  '# End node if_node'
  ' --- EXECUTION ---'
  simulator = AerSimulator()
  compiled_circuit = transpile(qc, simulator)
  print(compiled_circuit)
  job = simulator.run(compiled_circuit, shots=500)
  result_data = job.result()
  counts = result_data.get_counts(qc)
  print('Simulation Results (500 shots):', counts)
