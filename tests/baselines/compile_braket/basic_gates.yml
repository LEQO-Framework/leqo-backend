expected_result: |-
  from braket.circuits import Circuit
  from braket.devices import LocalSimulator

  def _leqo_qubit(operand):
      if isinstance(operand, (list, tuple)) and len(operand) == 1:
          return operand[0]
      return operand
  c = Circuit()
  leqo_reg = list(range(1))
  '# Start node q0'
  leqo_677c62829b2f503e829851dd8911e48a_literal = [leqo_reg[0]]
  leqo_677c62829b2f503e829851dd8911e48a_out = leqo_677c62829b2f503e829851dd8911e48a_literal
  '# End node q0'
  '# Start node gate_h'
  leqo_e43a67bf75f9513e8e47811ceb82577e_q0 = [leqo_reg[0]]
  c.h(_leqo_qubit(leqo_e43a67bf75f9513e8e47811ceb82577e_q0))
  leqo_e43a67bf75f9513e8e47811ceb82577e_q0_out = leqo_e43a67bf75f9513e8e47811ceb82577e_q0
  '# End node gate_h'
  '# Start node gate_x'
  leqo_2fb6b67067f752a1a4f49eac0ff2dbb4_q0 = [leqo_reg[0]]
  c.x(_leqo_qubit(leqo_2fb6b67067f752a1a4f49eac0ff2dbb4_q0))
  leqo_2fb6b67067f752a1a4f49eac0ff2dbb4_q0_out = leqo_2fb6b67067f752a1a4f49eac0ff2dbb4_q0
  '# End node gate_x'
  '# Start node m0'
  leqo_5f9029b590825673813bc86fde8c5635_q = [leqo_reg[0]]
  leqo_5f9029b590825673813bc86fde8c5635_result = [0]
  c.measure(leqo_5f9029b590825673813bc86fde8c5635_q[0])
  leqo_5f9029b590825673813bc86fde8c5635_out = leqo_5f9029b590825673813bc86fde8c5635_result
  leqo_5f9029b590825673813bc86fde8c5635_qubit_out = leqo_5f9029b590825673813bc86fde8c5635_q
  '# End node m0'
  ' --- EXECUTION ---'
  device = LocalSimulator()
  task = device.run(c, shots=500)
  counts = task.result().measurement_counts
  print('Simulation Results (500 shots):', counts)
  program_inputs = {0: leqo_5f9029b590825673813bc86fde8c5635_q}
  program_outputs = {0: leqo_5f9029b590825673813bc86fde8c5635_out, 1: leqo_5f9029b590825673813bc86fde8c5635_qubit_out}
